data_sources:
  - type: "csv"
    source: "$HOME/data/bogus/rorschach_output.csv"
    separator: ','
    has_headers: true
    patients_are_rows: true
    series_contexts:
      - identifier: "proband_id"
        data_context: subject_id
      - identifier: "term_id"
        data_context: hpo
        building_block_id: "hpo_1"
      - identifier: "severity_id"
        data_context: severity
        building_block_id: "hpo_1"
      - identifier: "observed_start"
        data_context:
          onset: date
        building_block_id: "hpo_1"
      - identifier: "observed_end"
        data_context:
          time_of_resolution: date
        building_block_id: "hpo_1"

pipeline:
  cache_dir: "$HOME/data/bogus/pxt_cache"
  strategies:
    - alias_map
    - default_mapping: sex_mapping
    #- date_to_age
    #- age_to_iso8601

  loader:
    file_system:
      output_dir: "$HOME/data/bogus/phenopackets"
      create_dir: true
  meta_data:
    created_by: Robinson Lab
    submitted_by: Robinson Lab
    cohort_name: "SynthPrechter"
    hpo_resource:
      id: "HP"
      version: "2026-02-16"
    disease_resources:
      - id: "MONDO"
        version: "2026-02-03"