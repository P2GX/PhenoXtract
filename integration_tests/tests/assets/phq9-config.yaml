pipeline:
  cache_dir: "$HOME/data/phq9/pxt_cache"
  strategies:
    - alias_map
    - default_mapping: sex_mapping
    - date_to_age
    - age_to_iso8601
    - hpo_disease_splitter

  loader:
    file_system:
      output_dir: "$HOME/data/phq9/phenopackets"
      create_dir: true
  meta_data:
    created_by: Robinson Lab
    submitted_by: Robinson Lab
    cohort_name: "Kaggle-PHQ9"
    hpo_resource:
      id: "HP"
      version: "2026-02-16"
    disease_resources:
      - id: "MONDO"
        version: "2026-02-03"