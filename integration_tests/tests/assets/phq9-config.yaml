data_sources:
  - type: "csv"
    source: "$HOME/data/phq9/phq9_patent_data.csv"
    has_headers: true
    patients_are_rows: true
    series_contexts:
      - identifier: "user_id"
        data_context: subject_id
      - identifier: "sex"
        data_context: subject_sex

      - identifier: "age"
        data_context:
          time_at_last_encounter: age
        building_block_id: "diagnosis"

  - type: "csv"
    source: "$HOME/data/phq9/rorschach_output.csv"
    has_headers: true
    patients_are_rows: true
    series_contexts:
      - identifier: "id"
        data_context: subject_id
      - identifier: "diagnosis_term_id"
        data_context: disease
        building_block_id: "diagnosis"
      - identifier: "diagnosis_observed_start"
        data_context:
          onset: date
        building_block_id: "diagnosis"
      - identifier: "diagnosis_observed_end"
        data_context:
          time_of_resolution: date
        building_block_id: "diagnosis"


      - identifier: "phenotype_1_term_id"
        data_context: hpo
        building_block_id: "hpo_1"
