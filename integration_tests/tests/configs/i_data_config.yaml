data_sources:
  - type: "excel"
    source: "$HOME/data/usidnet/i_data_edited.xlsx"
    sheets:
      - sheet_name: "Cohort"
        has_headers: true
        patients_are_rows: true
        series_contexts:
          - identifier: "PatientId"
            data_context: subject_id
          - identifier: "YOB"
            data_context: date_of_birth
          - identifier: "Living"
            data_context: vital_status
            alias_map:
              mappings:
                "Yes": "ALIVE"
                "No": "DECEASED"
              output_data_type: String
          - identifier: "Age of Death (Years)"
            data_context:
              time_of_death: age
            alias_map:
              mappings:
                "less than 1 year": "0"
              output_data_type: Int64
          - identifier: "Sex"
            data_context: subject_sex
          - identifier: "Most Recent Visit Date"
            data_context:
              time_at_last_encounter: date
          - identifier: "Diagnosis"
            data_context: disease
            building_block_id: "D"
            alias_map:
              mappings:
                path: "$HOME/data/usidnet/matchings/disease_matchings.csv"
                key_column_name: "FREE_TEXT"
                alias_column_name: "ALIAS"
              output_data_type: String
          - identifier: "Onset Age (Years)"
            data_context:
              onset: age
            building_block_id: "D"
            alias_map:
              mappings:
                "less than 1 year": "0"
              output_data_type: Int64
          - identifier: "Gene Mutation"
            data_context: hgnc
            building_block_id: "D"
            alias_map:
              mappings:
                path: "$HOME/data/usidnet/matchings/gene_matchings.csv"
                key_column_name: "FREE_TEXT"
                alias_column_name: "LABEL"
              output_data_type: String

      - sheet_name: "Vitals"
        has_headers: true
        patients_are_rows: true
        series_contexts:
          - identifier: "patientid"
            data_context: subject_id
          - identifier: "Vitals Date"
            data_context:
              time_of_measurement: date
            building_block_id: "M"
          - identifier: "Height (cm)"
            data_context:
              quantitative_measurement:
                assay_id: "LOINC:8302-2"
                unit_ontology_id: "UO:0000015"
            building_block_id: "M"
          - identifier: "Weight (kg)"
            data_context:
              quantitative_measurement:
                assay_id: "LOINC:29463-7"
                unit_ontology_id: "UO:0000009"
            building_block_id: "M"
          - identifier: "Body Mass Index"
            data_context:
              quantitative_measurement:
                assay_id: "LOINC:39156-5"
                unit_ontology_id: "UO:0000086"
            building_block_id: "M"

      - sheet_name: "Head Circ."
        has_headers: true
        patients_are_rows: true
        series_contexts:
          - identifier: "patientid"
            data_context: subject_id
          - identifier: "Head Circumf Date"
            data_context:
              time_of_measurement: date
            building_block_id: "M"
          - identifier: "Head (cm)"
            data_context:
              quantitative_measurement:
                assay_id: "LOINC:9843-4"
                unit_ontology_id: "UO:0000015"
            building_block_id: "M"

      - sheet_name: "Infections"
        has_headers: true
        patients_are_rows: true
        series_contexts:
          - identifier: "patientid"
            data_context: subject_id
          - identifier: "Infection"
            data_context: disease
            building_block_id: "I"
            alias_map:
              mappings:
                path: "$HOME/data/usidnet/matchings/infection_matchings.csv" # should just be MONDO terms
                key_column_name: "FREE_TEXT"
                alias_column_name: "CURIE_ID"
              output_data_type: String
          - identifier: "Organism"
            data_context: primary_site
            building_block_id: "I"
            alias_map:
              mappings:
                path: "$HOME/data/usidnet/matchings/organism_matchings.csv"
                key_column_name: "FREE_TEXT"
                alias_column_name: "CURIE_ID"
              output_data_type: String

      - sheet_name: "Conditions"
        has_headers: true
        patients_are_rows: true
        series_contexts:
          - identifier: "patientid"
            data_context: subject_id
          - identifier: "Condition"
            data_context: hpo_or_disease
            alias_map:
              mappings:
                path: "$HOME/data/usidnet/matchings/condition_matchings.csv"
                key_column_name: "FREE_TEXT"
                alias_column_name: "CURIE_ID"
              output_data_type: String

      - sheet_name: "Allergic Reactions"
        has_headers: true
        patients_are_rows: true
        series_contexts:
          - identifier: "patientid"
            data_context: subject_id
          - identifier: "Agent" # We extract the allergy type. It's too hard to extract the specific allergens or the reactions.
            data_context: hpo
            alias_map:
              mappings:
                "Drug": null
                "Environmental": null
                "Food": "Food allergy"
                "Other": null
                "Unknown": null
                "Unknown Agent": null
              output_data_type: String

      - sheet_name: "Anti Infectives"
        has_headers: true
        patients_are_rows: true
        series_contexts:
          - identifier: "patientid"
            data_context: subject_id
          - identifier: "Type" # We extract the type, not the specific drug, as the treatment_agent. This is easier to analyse but much less specific.
            data_context: treatment_agent
            alias_map:
              mappings:
                "Antibiotic": "antibacterial agent"
                "Antifungal": "antifungal agent"
                "Antivirals": "antiviral agent"
                "Antiparasitic": "antiparasitic agent"
                "Other": null
              output_data_type: String
            building_block_id: "anti_infective_drug"
          - identifier: "Indication"
            data_context: treatment_intent
            alias_map:
              mappings:
                path: "$HOME/data/usidnet/matchings/anti_infective_indication_matchings.csv" # I have just matched them to Intent for Prophylaxis VS Intent to Treat
                key_column_name: "FREE_TEXT"
                alias_column_name: "CURIE_ID"
              output_data_type: String
            building_block_id: "anti_infective_drug"

      - sheet_name: "Transfusions"
        has_headers: true
        patients_are_rows: true
        series_contexts:
          - identifier: "patientid"
            data_context: subject_id
          - identifier: "Leukocyte"
            data_context: procedure
            alias_map:
              output_data_type: String
              mappings:
                "Yes": "NCIT:C15773" # TODO(Rouven): This is a placeholder. I could not really find anything. OMIT:0018013 Would work, but OMIT only supports OWL.
                "No": null
            building_block_id: "leukocyte_transfusion"
          - identifier: "Platelet"
            data_context: procedure
            alias_map:
              output_data_type: String
              mappings:
                "Yes": "NCIT:C15366"
                "No": null
            building_block_id: "platelet_transfusion"
          - identifier: "Red Cell"
            data_context: procedure
            alias_map:
              output_data_type: String
              mappings:
                "Yes": "NCIT:C15409"
                "No": null
            building_block_id: "red_cell_transfusion"
          - identifier: "Fresh Frozen Plasma"
            data_context: procedure
            alias_map:
              output_data_type: String
              mappings:
                "Yes": "NCIT:C140042" # TODO(Rouven): This is just Plasma Transfusion, no frozen nor fresh.
                "No": null
            building_block_id: "plasma_transfusion"
          - identifier: "Whole Blood"
            data_context: procedure
            alias_map:
              output_data_type: String
              mappings:
                "Yes": "NCIT:C62749"
                "No": null
            building_block_id: "blood_transfusion"

      - sheet_name: "Organ Transp"
        has_headers: true
        patients_are_rows: true
        series_contexts:
          - identifier: "patientid"
            data_context: subject_id
          - identifier: "Solid Organ"
            data_context: procedure
            alias_map:
              mappings:
                path: "$HOME/data/usidnet/matchings/solid_organ_matchings.csv"
                key_column_name: "FREE_TEXT"
                alias_column_name: "CURIE_ID"
              output_data_type: String
            building_block_id: "organ_transplant"
          - identifier: "Reason"
            data_context: treatment_target
            alias_map:
              mappings:
                path: "$HOME/data/usidnet/matchings/reason_matchings.csv"
                key_column_name: "FREE_TEXT"
                alias_column_name: "CURIE_ID"
              output_data_type: String
            building_block_id: "organ_transplant"
          - identifier: "Outcome"
            data_context: response_to_treatment
            alias_map:
              mappings:
                path: "$HOME/data/usidnet/matchings/outcome_matchings.csv"
                key_column_name: "FREE_TEXT"
                alias_column_name: "CURIE_ID"
              output_data_type: String
            building_block_id: "organ_transplant"
          - identifier: "Year"
            data_context:
              time_of_procedure: date
            building_block_id: "organ_transplant"

      - sheet_name: "SCT"
        has_headers: true
        patients_are_rows: true
        series_contexts:
          - identifier: "patientid"
            data_context: subject_id
          - identifier: "Transplant?"
            data_context: procedure
            alias_map:
              output_data_type: String
              mappings:
                "Yes": "MAXO:0000747"
                "No": null
            building_block_id: "sct"
          #- identifier: "Transplant Date" # TODO: Has negative ages
          #  data_context:
          #    time_of_procedure: date
          #  building_block_id: "sct"


      - sheet_name: "Nonsurg Procedure"
        has_headers: true
        patients_are_rows: true
        series_contexts:
          - identifier: "patientid"
            data_context: subject_id
          - identifier: "Treatment Name"
            data_context: procedure
            building_block_id: "nonsurg"
            alias_map:
              mappings:
                path: "$HOME/data/usidnet/matchings/nonsurg_treatment_name_matchings.csv"
                key_column_name: "FREE_TEXT"
                alias_column_name: "CURIE_ID"
              output_data_type: String
          #- identifier: "Start Date" TODO: Negative dates again
          #  data_context:
          #    time_of_procedure: date
          #  building_block_id: "nonsurg"

      - sheet_name: "Disabilities"
        has_headers: true
        patients_are_rows: true
        series_contexts:
          - identifier: "patientid"
            data_context: subject_id
          - identifier: "Disability"
            data_context: hpo
            alias_map:
              mappings:
                path: "$HOME/data/usidnet/matchings/disability_matchings.csv"
                key_column_name: "FREE_TEXT"
                alias_column_name: "LABEL"
              output_data_type: String

      - sheet_name: "Molecular Info"
        has_headers: true
        patients_are_rows: true
        series_contexts:
          - identifier: "patientid"
            data_context: subject_id
          - identifier: "Gene Mutation"
            data_context: hgnc
            building_block_id: "D"
            alias_map:
              mappings:
                path: "$HOME/data/usidnet/matchings/gene_matchings.csv"
                key_column_name: "FREE_TEXT"
                alias_column_name: "LABEL"
              output_data_type: String


      - sheet_name: "Karnofsky Lansky"
        has_headers: true
        patients_are_rows: true
        series_contexts:
          - identifier: "patientid"
            data_context: subject_id
          - identifier: "Visit Date"
            data_context:
              time_of_measurement: date
            building_block_id: "KARN/LAN"
          - identifier: "KARN SCORE"
            data_context:
              quantitative_measurement:
                assay_id: "LOINC:89243-0"
                unit_ontology_id: "NCIT:C192525"
            building_block_id: "KARN/LAN"
          - identifier: "LANSK SCORE"
            data_context:
              quantitative_measurement:
                assay_id: "LOINC:89243-0" # TODO: This is Karnofsky score again because Lansky score is not in LOINC
                unit_ontology_id: "NCIT:C192525"
            building_block_id: "KARN/LAN"

  - type: "csv"
    source: "$HOME/data/usidnet/i_data_variants_patrick_edits.csv"
    separator: ";"
    has_headers: true
    patients_are_rows: true
    series_contexts:
      - identifier: "patientid"
        data_context: subject_id
      - identifier: "hgvs1"
        data_context: hgvs
        building_block_id: "D"
      - identifier: "hgvs2"
        data_context: hgvs
        building_block_id: "D"

pipeline:
  cache_dir: "$HOME/data/usidnet/pxt_cache"
  strategies:
    - alias_map
    - default_mapping: sex_mapping
    - date_to_age:
        strict: true
    - age_to_iso8601
    - hpo_disease_splitter

  loader:
    file_system:
      output_dir: "$HOME/data/usidnet/phenopackets"
      create_dir: true

  meta_data:
    created_by: Robinson Lab
    submitted_by: Robinson Lab
    cohort_name: "I_COHORT"
    hpo_resource:
      id: "HP"
      version: "2026-02-16"
    unit_resources:
      - id: "UO"
        version: "2026-01-09"
      - id: "NCIT"
        version: "2026-03-19"
    disease_resources:
      - id: "MONDO"
        version: "2026-02-03"
    assay_resources:
      - id: "LOINC"
        secrets:
          user: ${LOINC_USERNAME}
          password: ${LOINC_PASSWORD}
      - id: "NCIT"
        version: "2026-03-19"
    procedure_resources:
      - id: "MAXO"
        version: "2026-01-15"
      - id: "NCIT"
        version: "2026-03-19"
    anatomy_resources:
      - id: "NCIT"
        version: "2026-03-19"
    treatment_attributes_resources:
      - id: "NCIT"
        version: "2026-03-19"
    drug_resources:
      - id: "CHEBI"
        version: "251"