data_sources:
  - type: "csv"
    source: "$HOME/data/lukas_data/test.csv"
    has_headers: true
    patients_are_rows: true
    series_contexts:
      - identifier: "Patient ID"
        data_context: subject_id
      - identifier: "HPO ID"
        data_context: hpo

pipeline:
  strategies:
    - alias_map
    - default_mapping: sex_mapping
    - date_to_age
    - age_to_iso8601
    - hpo_disease_splitter

  loader:
    file_system:
      output_dir: "$HOME/data/lukas_data/phenopacket"
      create_dir: true
  meta_data:
    created_by: Lukas Ramlow
    submitted_by: Lukas Ramlow
    cohort_name: "I_COHORT"
    hpo_resource:
      id: "HP"
      version: "2026-02-16"