name: CI

on:
  pull_request:


permissions:
  id-token: write
  contents: read

env:
  CARGO_TERM_COLOR: always
  CI: true

jobs:
  compile_and_test:
    name: Compile & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        toolchain:
          - stable
    env:
      LOINC_USERNAME: ${{ secrets.LOINC_USERNAME }}
      LOINC_PASSWORD: ${{ secrets.LOINC_PASSWORD }}

    steps:
      - name: Check out Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust Toolchain for GitHub CI
        uses: actions-rust-lang/setup-rust-toolchain@v1.13.0
        with:
          toolchain: stable

      #- name: Rust Cache
      #  uses: Swatinem/rust-cache@v2.8.0

      - name: Test
        run: cargo test --color always --all-features --lib --all-targets --workspace
      # run: cargo nextest run --workspace --lib --all-targets --all-features

  format:
    name: Code Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust Toolchain for GitHub CI
        uses: actions-rust-lang/setup-rust-toolchain@v1.13.0
        with:
          toolchain: stable
          components: rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.8.0

      - name: Check formatting of Rust code with rustfmt
        uses: actions-rust-lang/rustfmt@v1.1.1

  lint:
    name: Code Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust Toolchain for GitHub CI
        uses: actions-rust-lang/setup-rust-toolchain@v1.13.0
        with:
          toolchain: stable
          components: clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.8.0

      - run: cargo clippy --workspace --lib --all-targets --all-features -- -D clippy::dbg-macro

  doc-check:
    name: Doc Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1.13.0
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2.8.0

      - name: Check documentation
        env:
          RUSTDOCFLAGS: "-D warnings -D rustdoc::broken_intra_doc_links"
        run: cargo doc --no-deps --all-features

  UI-Linting:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./phenoxtract-ui
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: phenoxtract-ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint ./src --ext .js,.jsx,.ts,.tsx
